# Supabase project configuration
# https://supabase.com/docs/guides/local-development

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
# Storage buckets for file attachments
# Create these in the Supabase dashboard or via SQL:
# INSERT INTO storage.buckets (id, name, public) VALUES ('project-attachments', 'project-attachments', false);
# INSERT INTO storage.buckets (id, name, public) VALUES ('service-attachments', 'service-attachments', false);
# INSERT INTO storage.buckets (id, name, public) VALUES ('measurement-attachments', 'measurement-attachments', false);
# INSERT INTO storage.buckets (id, name, public) VALUES ('avatars', 'avatars', true);

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[realtime]
enabled = true
# Realtime subscriptions — enable for live updates on:
# projects, services, measurements, project_notifications
