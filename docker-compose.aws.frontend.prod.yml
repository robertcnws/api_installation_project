services:
  aws_frontend_app:
    platform: linux/amd64
    build:
      context: ./frontend_app
      dockerfile: Dockerfile.aws.frontend.prod
    container_name: aws_frontend_app
    environment:
      - NODE_ENV=production
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "3030:3030"
    networks:
      - net_installation
    restart: unless-stopped

networks:
  net_installation:
    driver: bridge