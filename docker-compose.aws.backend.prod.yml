services:
  aws_backend_app:
    build:
      context: ./backend_app
      dockerfile: Dockerfile.aws.backend.prod
    container_name: aws_backend_app
    restart: unless-stopped
    volumes:
      - ./backend_app:/app
      - ./backend_app/gunicorn.conf.py:/etc/nginx/gunicorn.conf.py
      - ./backend_app/static:/app/staticfiles
    ports:
      - "8001:8001"
    networks:
      - net_installation

networks:
  net_installation:
    driver: bridge